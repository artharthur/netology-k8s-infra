name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci-cd.yml'
    tags:
      - 'v*'

env:
  REGISTRY: 10.10.1.20:5000
  IMAGE_NAME: test-app

jobs:
  build:
    runs-on: [self-hosted, k3s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.meta.outputs.version }} \
            -t ${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.version }} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            ./app

      - name: Push image
        run: |
          docker push ${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.version }}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest

  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: [self-hosted, k3s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Deploy to k3s
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/test-app \
            test-app=${REGISTRY}/${IMAGE_NAME}:${VERSION} -n default
          kubectl rollout status deployment/test-app -n default --timeout=120s
