---
- name: Установить зависимости для k3s
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

- name: Скопировать бинарь k3s на ноду
  ansible.builtin.copy:
    src: k3s
    dest: /usr/local/bin/k3s
    mode: "0755"
    owner: root
    group: root

- name: Скопировать установщик k3s на ноду
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /root/k3s-install.sh
    mode: "0755"

- name: Установить k3s server (control-plane)
  when: "'k3s_server' in group_names"
  block:
    - name: Запустить установку server (без скачивания)
      ansible.builtin.shell: |
        INSTALL_K3S_SKIP_DOWNLOAD=true /root/k3s-install.sh server \
          --node-name {{ inventory_hostname }} \
          --node-ip {{ ansible_host }} \
          --advertise-address {{ ansible_host }} \
          --tls-san {{ ansible_host }} \
          --disable traefik \
          --disable servicelb \
          --write-kubeconfig-mode 644 \
          --kubelet-arg=feature-gates=KubeletInUserNamespace=true
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Дождаться готовности node-token
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 90

    - name: Прочитать node-token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Сохранить токен как факт для агентов
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Установить k3s agent (worker)
  when: "'k3s_agents' in group_names"
  block:
    - name: Запустить установку agent (без скачивания)
      ansible.builtin.shell: |
        INSTALL_K3S_SKIP_DOWNLOAD=true \
        K3S_URL="https://{{ hostvars[groups['k3s_server'][0]]['ansible_host'] }}:6443" \
        K3S_TOKEN="{{ hostvars[groups['k3s_server'][0]]['k3s_node_token'] }}" \
        /root/k3s-install.sh agent \
          --node-name {{ inventory_hostname }} \
          --node-ip {{ ansible_host }} \
          --kubelet-arg=feature-gates=KubeletInUserNamespace=true
      args:
        creates: /etc/systemd/system/k3s-agent.service

- name: Забрать kubeconfig с сервера на управляющую машину
  when: "'k3s_server' in group_names"
  block:
    - name: Прочитать kubeconfig с сервера
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw

    - name: Сохранить kubeconfig локально с правильным адресом сервера
      ansible.builtin.copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: "{{ playbook_dir }}/../kubeconfig"
        mode: "0600"
      delegate_to: localhost
      become: false
